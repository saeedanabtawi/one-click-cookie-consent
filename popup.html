<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>One-Click Cookie Consent</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 250px;
      padding: 15px;
      margin: 0;
      background-color: #f9f9f9;
      color: #333;
    }
    h2 {
      margin-top: 0;
      font-size: 16px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 5px;
    }
    .option {
      margin-bottom: 10px;
    }
    label {
      display: flex;
      align-items: center;
      cursor: pointer;
      font-size: 14px;
    }
    input[type="radio"] {
      margin-right: 8px;
    }
    .status {
      margin-top: 15px;
      font-size: 12px;
      color: #666;
      text-align: center;
    }
    button {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background-color: #45a049;
    }
    .footer {
      margin-top: 15px;
      font-size: 10px;
      text-align: center;
      color: #999;
    }
  </style>
</head>
<body>
  <h2>Cookie Preferences</h2>
  <div class="option">
    <label>
      <input type="radio" name="preference" value="rejectAll" checked>
      Reject All / Necessary Only
    </label>
  </div>
  <div class="option">
    <label>
      <input type="radio" name="preference" value="acceptAll">
      Accept All
    </label>
  </div>
  
  <button id="saveBtn">Save Preferences</button>
  <div id="status" class="status"></div>
  
  <div class="footer">
    One-Click Cookie Consent
  </div>

  <script src="popup.js"></script>
</body>
</html>
