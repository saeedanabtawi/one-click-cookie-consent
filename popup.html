<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>One-Click Cookie Consent</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 280px;
      padding: 15px;
      margin: 0;
      background-color: #d9e6f6; /* Light pastel blue matching image background */
      color: #2c3e50; /* Dark slate blue for better integration with theme */
    }
    h2 {
      margin-top: 0;
      font-size: 16px;
      border-bottom: 1px solid rgba(53, 103, 204, 0.2);
      padding-bottom: 5px;
      margin-bottom: 15px;
      color: #1a3673;
    }
    .section {
      margin-bottom: 15px;
      padding: 10px;
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(53, 103, 204, 0.1);
    }
    .section-title {
      font-size: 12px;
      font-weight: bold;
      color: #5b74a1;
      margin-top: 0;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .option {
      margin-bottom: 8px;
    }
    label {
      display: flex;
      align-items: center;
      cursor: pointer;
      font-size: 14px;
    }
    input[type="radio"], input[type="checkbox"] {
      margin-right: 8px;
      accent-color: #3567cc; /* Strong blue matching icon */
    }
    .stats-grid {
      display: flex;
      justify-content: space-between;
      text-align: center;
    }
    .stat-box {
      flex: 1;
    }
    .stat-value {
      font-size: 20px;
      font-weight: bold;
      color: #3567cc; /* Strong blue matching icon */
    }
    .stat-label {
      font-size: 11px;
      color: #666;
    }
    .status {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
      text-align: center;
      min-height: 15px;
    }
    button {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      background-color: #3567cc; /* Strong blue matching icon */
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #2853ad; /* Darker blue on hover */
    }
    .footer {
      margin-top: 15px;
      font-size: 10px;
      text-align: center;
      color: #5b74a1;
    }
    .current-site {
      font-size: 12px;
      word-break: break-all;
      margin-bottom: 8px;
      color: #3567cc;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <h2>One-Click Cookie Consent</h2>
  
  <div class="section">
    <p class="section-title">Your Impact</p>
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-value" id="bannersClicked">0</div>
        <div class="stat-label">Banners Clicked</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="timeSaved">0m</div>
        <div class="stat-label">Time Saved</div>
      </div>
    </div>
  </div>

  <div class="section">
    <p class="section-title">Preferences</p>
    <div class="option">
      <label>
        <input type="radio" name="preference" value="rejectAll" checked>
        Reject All / Necessary
      </label>
    </div>
    <div class="option">
      <label>
        <input type="radio" name="preference" value="acceptAll">
        Accept All
      </label>
    </div>
    <button id="saveBtn">Save Preferences</button>
    <div id="status" class="status"></div>
  </div>

  <div class="section">
    <p class="section-title">Current Site</p>
    <div id="currentHostname" class="current-site">Loading...</div>
    <label>
      <input type="checkbox" id="whitelistToggle">
      Disable on this site
    </label>
  </div>
  
  <div class="footer">
    Saving the web, one click at a time.
  </div>

  <script src="popup.js"></script>
</body>
</html>
